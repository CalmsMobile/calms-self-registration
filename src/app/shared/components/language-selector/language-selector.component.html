<div class="language-wrapper" [class.lang-open]="showDropdown">
  <!-- Language button -->
  <button class="lang-btn" (click)="toggleDropdown()" type="button" aria-label="Select language">
    文A
  </button>

  <!-- Backdrop + panel -->
  @if (showDropdown) {
  <div class="lang-backdrop" (click)="toggleDropdown()"></div>
  <div class="lang-panel">
    @for (lang of languages; track lang.LanguageId) {
    <button class="lang-item"
            [class.active]="selectedLanguage?.LanguageId === lang.LanguageId"
            (click)="selectLanguage(lang)"
            type="button">
      <span class="lang-flag">{{ getFlagEmoji(lang.LanguageCode) }}</span>
      <span class="lang-name">{{ lang.LanguageName }}</span>
    </button>
    }
  </div>
  }
</div>
