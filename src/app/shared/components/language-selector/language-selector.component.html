<div class="language-wrapper">
  <!-- Globe button -->
  <button class="lang-btn" (click)="toggleDropdown()" type="button" title="Change language">
    <i class="pi pi-globe"></i>
  </button>

  <!-- Custom dropdown -->
  @if (showDropdown) {
  <div class="lang-dropdown">
    @for (lang of languages; track lang.LanguageId) {
    <button class="lang-option"
            [class.active]="selectedLanguage?.LanguageId === lang.LanguageId"
            (click)="selectLanguage(lang)"
            type="button">
      <span class="lang-code">{{ getCountryCode(lang.LanguageCode) }}</span>
      <span class="lang-name">{{ lang.LanguageName }}</span>
    </button>
    }
  </div>
  }
</div>
