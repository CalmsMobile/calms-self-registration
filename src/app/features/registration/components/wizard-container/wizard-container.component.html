@if (!isLoading) {
<div class="wizard-container" [class.own-layout]="!showSharedLayout">
  <div class="wizard-card">

    <!-- Branch Header - hidden for pages with own layout -->
    @if (showSharedLayout) {
    <div class="branch-header flex-header">
      <div class="header-center">
        <img routerLink="/" [src]="logo" alt="Company Logo" class="logo-company">
        <h1 routerLink="/" class="app-title">{{title}}</h1>
      </div>
      <app-language-selector class="wiz-lang"></app-language-selector>
    </div>
    }

    <!-- Wizard Content -->
    <div class="wizard-content" [class.no-padding]="!showSharedLayout">
      <router-outlet (activate)="onStepActivated($event)"></router-outlet>
    </div>

    <!-- Wizard Navigation - hidden for pages with own layout or own nav -->
    @if (showWizardNav) {
    <div class="wizard-navigation">
      <div class="navigation-button">
        @if (activeIndex > 0) {
        <p-button styleClass="back-btn" [label]="'registration_page_previous_step' | translate" icon="pi pi-arrow-left"
          (onClick)="onPrevious()">
        </p-button>
        }
        <p-button styleClass="next-btn"
          [label]="activeIndex === items.length - 1 ? ('nda_agreement_button_submit' | translate) : ('registration_page_next_step' | translate)"
          [icon]="activeIndex === items.length - 1 ? 'pi pi-check' : 'pi pi-arrow-right'" iconPos="right"
          (click)="onNext()">
        </p-button>
      </div>
    </div>
    }

  </div>
</div>
}
@if (isLoading) {
<div class="loading-indicator">
  <div class="loader">
    <div class="pacman">
      <div class="top"></div>
      <div class="bottom"></div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>
}
<p-toast position="top-center"></p-toast>
