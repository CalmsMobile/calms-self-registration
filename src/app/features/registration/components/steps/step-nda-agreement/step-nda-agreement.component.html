<div class="step-container">
  <div class="step-content">

    <!-- NDA HTML Content -->
    <div class="nda-text" [innerHTML]="getNdaHtml()"></div>

    <!-- Signature Section -->
    <div class="signature-section">
      <h3 class="signature-title">{{ 'signature' | translate }}</h3>
      <p class="signature-instruction">{{ 'draw_signature_below' | translate }}</p>

      <div class="signature-pad-wrapper" [class.error]="showValidationError">
        <canvas
          #signatureCanvas
          class="signature-canvas"
          (mousedown)="onMouseDown($event)"
          (mousemove)="onMouseMove($event)"
          (mouseup)="onMouseUp()"
          (mouseleave)="onMouseLeave()"
          (touchstart)="onTouchStart($event)"
          (touchmove)="onTouchMove($event)"
          (touchend)="onTouchEnd($event)">
        </canvas>
      </div>

      @if (showValidationError) {
        <span class="error-message">{{ 'signature_required' | translate }}</span>
      }

      <div class="signature-actions">
        <p-button
          styleClass="clear-btn"
          [label]="'clear' | translate"
          icon="pi pi-eraser"
          severity="secondary"
          [outlined]="true"
          (onClick)="clearSignature()">
        </p-button>
      </div>
    </div>

  </div>
</div>

<p-toast></p-toast>
