<main class="page">
  <section class="layout">
    <div class="left">
      <h2>
        <span class="accent">{{ 'equipment_movement' | translate }}</span>
      </h2>
      <p>{{ 'em_instruction' | translate }}</p>
      <div class="illustration">
        <img src="/assets/item.png" alt="Equipment movement illustration" />
      </div>
    </div>

    <div class="divider"></div>

    <div class="right">
      <div class="form">
        <label class="field">
          <span class="label">{{ 'item_description' | translate }}</span>
          <input type="text"
            [(ngModel)]="newItem.description"
            (ngModelChange)="checkInputs()"
            [placeholder]="'item_description' | translate:'placeholder'" />
        </label>
        <label class="field">
          <span class="label">{{ 'serial_number' | translate }}</span>
          <input type="text"
            [(ngModel)]="newItem.serialNumber"
            (ngModelChange)="checkInputs()"
            [placeholder]="'serial_number' | translate:'placeholder'" />
        </label>
        <label class="field">
          <span class="label">{{ 'em_direction' | translate }}</span>
          <div class="select-wrap">
            <select [(ngModel)]="newItem.direction" (ngModelChange)="checkInputs()">
              <option value="">{{ 'em_direction' | translate:'placeholder' }}</option>
              <option value="IN">IN</option>
              <option value="OUT">OUT</option>
            </select>
          </div>
        </label>
        <button class="btn-outline" type="button" [disabled]="!canAdd" (click)="addItem()">
          {{ 'add_item' | translate }}
          <span class="add-icon">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
              <path fill-rule="evenodd" d="M2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10S2 17.523 2 12Zm11-4.243a1 1 0 1 0-2 0V11H7.757a1 1 0 1 0 0 2H11v3.243a1 1 0 1 0 2 0V13h3.243a1 1 0 1 0 0-2H13V7.757Z" clip-rule="evenodd" />
            </svg>
          </span>
        </button>
      </div>

      @if (declaredItems.length > 0) {
      <div class="list">
        <div class="list-title">{{ 'added_items' | translate }}</div>
        <div class="list-items">
          @for (item of declaredItems; track $index) {
          <div class="item">
            <div class="item-name">{{ item.description }}</div>
            <div class="badge" [class.in]="item.direction === 'IN'">
              <span class="arrow">{{ item.direction === 'IN' ? '\u25BC' : '\u25B2' }}</span>
              {{ item.direction }}
            </div>
            <button class="delete" type="button" (click)="removeItem($index)" aria-label="Delete">
              <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd" d="M8.586 2.586A2 2 0 0 1 10 2h4a2 2 0 0 1 2 2v2h3a1 1 0 1 1 0 2v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8a1 1 0 0 1 0-2h3V4a2 2 0 0 1 .586-1.414ZM10 6h4V4h-4v2Zm1 4a1 1 0 1 0-2 0v8a1 1 0 1 0 2 0v-8Zm4 0a1 1 0 1 0-2 0v8a1 1 0 1 0 2 0v-8Z" clip-rule="evenodd" />
              </svg>
            </button>
          </div>
          }
        </div>
      </div>
      }

      <div class="actions">
        <div class="actions-left">
          <button class="btn grey" type="button" (click)="goBack()"><span class="icon-left">&larr;</span> {{ 'em_back' | translate }}</button>
          <button class="btn grey" type="button" (click)="skipStep()">{{ 'em_skip' | translate }} <span class="icon-right">&rarr;</span></button>
        </div>
        <button class="btn yellow" type="button" (click)="proceedToNext()">{{ 'em_continue' | translate }} <span class="icon-right">&rarr;</span></button>
      </div>
    </div>
  </section>
</main>
