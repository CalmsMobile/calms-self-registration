<div class="wrapper">

  <img src="assets/logo.png" class="header-img" alt="Company Logo">

  <div class="title">{{ 'item_declaration' | translate }}</div>
  <div class="subtitle">{{ 'em_instruction' | translate }}</div>

  <!-- Input Form -->
  <div class="form-box">

    <div class="label">{{ 'item_description' | translate }}</div>
    <input
      class="form-input"
      [(ngModel)]="newItem.description"
      (ngModelChange)="checkInputs()"
      [placeholder]="'item_description' | translate:'placeholder'">

    <div class="label">Serial Number</div>
    <input
      class="form-input"
      [(ngModel)]="newItem.serialNumber"
      (ngModelChange)="checkInputs()"
      placeholder="Enter the serial number">

    <div class="label">{{ 'em_direction' | translate }}</div>
    <select
      class="form-input select-input"
      [(ngModel)]="newItem.direction"
      (ngModelChange)="checkInputs()">
      <option value="">In or out</option>
      <option value="IN">IN</option>
      <option value="OUT">OUT</option>
    </select>

    <button
      class="add-btn"
      [class.active]="canAdd"
      [disabled]="!canAdd"
      (click)="addItem()">
      {{ 'add_item' | translate }}
    </button>

    <!-- Added items -->
    @if (declaredItems.length > 0) {
      <div class="added-section">
        <div class="added-title">Added items</div>
        @for (item of declaredItems; track $index) {
          <div class="added-row">
            <div class="pill">{{ item.description }}</div>
            <div class="pill direction">{{ item.direction }}</div>
            <span class="delete" (click)="removeItem($index)">🗑</span>
          </div>
        }
      </div>
    }

  </div>

  <div class="bottom">
    <div class="row">
      <button class="btn white" (click)="goBack()">← {{ 'back' | translate }}</button>
      <button class="btn white" (click)="skipStep()">{{ 'em_skip' | translate }} →</button>
    </div>
    <button class="btn continue" (click)="proceedToNext()">{{ 'em_continue' | translate }} →</button>
  </div>

</div>
