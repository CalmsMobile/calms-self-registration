<div class="wrapper">

  <img src="assets/logo.png" class="header-img" alt="Company Logo">

  <div class="title"><span>Prohibited</span><br>Items</div>
  <div class="subtitle">Declare items you are carrying</div>

  <!-- Input Form -->
  <div class="form-box">

    <div class="label">Item Description</div>
    <input
      class="form-input"
      [(ngModel)]="newItem.description"
      (ngModelChange)="checkInputs()"
      placeholder="Enter the item description">

    <div class="label">Serial Number</div>
    <input
      class="form-input"
      [(ngModel)]="newItem.serialNumber"
      (ngModelChange)="checkInputs()"
      placeholder="Enter the serial number">

    <div class="label">Direction</div>
    <select
      class="form-input select-input"
      [(ngModel)]="newItem.direction"
      (ngModelChange)="checkInputs()">
      <option value="">In or out</option>
      <option value="IN">IN</option>
      <option value="OUT">OUT</option>
    </select>

    <button
      class="add-btn"
      [class.active]="canAdd"
      [disabled]="!canAdd"
      (click)="addItem()">
      Add item
    </button>

    <!-- Added items -->
    @if (declaredItems.length > 0) {
      <div class="added-section">
        <div class="added-title">Added items</div>
        @for (item of declaredItems; track $index) {
          <div class="added-row">
            <div class="pill">{{ item.description }}</div>
            <div class="pill direction">{{ item.direction }}</div>
            <span class="delete" (click)="removeItem($index)">🗑</span>
          </div>
        }
      </div>
    }

  </div>

  <div class="bottom">
    <div class="row">
      <button class="btn white" (click)="goBack()">← Back</button>
      <button class="btn white" (click)="skipStep()">Skip →</button>
    </div>
    <button class="btn continue" (click)="proceedToNext()">Continue →</button>
  </div>

</div>
